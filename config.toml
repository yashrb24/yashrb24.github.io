# serene v5.5.0
# docs: https://github.com/isunjn/serene/blob/latest/USAGE.md

base_url = "https://yashrb24.github.io"
title = "Yash's website"
description = "Personal website and blog"
default_language = "en"
theme = "serene"
output_dir = "public"
compile_sass = true
minify_html = false
build_search_index = false
generate_feeds = false
feed_filenames = ["feed.xml"]
taxonomies = [{ name = "tags" }, { name = "categories" }]

[markdown]
render_emoji = false
external_links_target_blank = false
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = false

[markdown.highlighting]
style = "class"
extra_themes = ["highlight_themes/serene-light.json", "highlight_themes/serene-dark.json"]
light_theme = "Tomorrow"
dark_theme = "Tomorrow Night"

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[extra]
sections = [
  { name = "More about me", path = "/about", is_external = false, desc = "background & contact" },
  { name = "Experience", path = "/experience", is_external = false, desc = "roles & research internships" },
  { name = "Projects", path = "/projects", is_external = false, desc = "systems & ML I've built" },
  { name = "Publications", path = "/publications", is_external = false, desc = "papers & preprints" },
  { name = "Et cetera", path = "/posts", is_external = false, desc = "writing & notes" },
]
blog_section_path = "/posts"

back_link_text = "back"
force_theme = false

footer_copyright = "Yash Bhisikar"
footer_credits = false 

not_found_error_text = "404 Not Found"
not_found_recover_text = "back to home"

reaction = false
reaction_align = "right"
