<style>

  /* light mode colors */
  body {
    --primary-color: #5871a2;
    --primary-pale-color: #5871a233;
    --primary-decoration-color: #5871a210;
    --bg-color: #ffffff;
    --text-color: #2f3030;
    --text-pale-color: #767676;
    --text-decoration-color: #a9a9a9;
    --highlight-mark-color: #5f75b020;

    --callout-note-color: #5871a2;
    --callout-tip-color: #268556;
    --callout-important-color: #885fc9;
    --callout-warning-color: #ab6632;
    --callout-caution-color: #c64e4e;
  }

  /* dark mode colors */
  body.dark {
    --primary-color: #6f8fd1;
    --primary-pale-color: #6f8fd166;
    --primary-decoration-color: #6f8fd112;
    --bg-color: #1c1c1c;
    --text-color: #c1c1c1;
    --text-pale-color: #848484;
    --text-decoration-color: #5f5f5f;
    --highlight-mark-color: #8296cb3b;

    --callout-note-color: #6f8fd1;
    --callout-tip-color: #47976f;
    --callout-important-color: #9776cd;
    --callout-warning-color: #ad7a52;
    --callout-caution-color: #d06161;
  }

  /* typography */
  body {
    --main-font: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
    --code-font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    --homepage-max-width: 768px;
    --main-max-width: 768px;
    --avatar-size: 120px;
    --font-size: 14px;
    --line-height: 1.75;
    --img-border-radius: 0px;
    --detail-border-radius: 0px;
    --dark-mode-img-brightness: 0.75;
    --dark-mode-chart-brightness: 0.75;
    --inline-code-border-radius: 2px;
    --inline-code-bg-color: var(--primary-decoration-color);
    --block-code-border-radius: 0px;
    --block-code-border-color: var(--primary-color);
    --detail-border-color: var(--primary-color);
  }

  /* Header: small rectangular avatar beside name/tagline/social */
  body.homepage #info {
    align-items: center;
    flex-wrap: wrap;
    gap: 1.2em;
  }

  body.homepage #info #text {
    gap: 0.5em;
  }

  body.homepage #info img {
    border-radius: 0 !important;
    width: auto !important;
    height: auto !important;
    max-height: 96px !important;
    object-fit: contain !important;
  }

  /* Updates rendered as a scrollable terminal changelog */
  #updates {
    margin-top: 2.5em;
    padding: 0 15px;
  }

  #updates h3 {
    margin-bottom: 0.9em;
    font-family: var(--code-font);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-pale-color);
    letter-spacing: 0.02em;
  }

  #updates h3::before {
    content: "$ ";
    color: var(--primary-color);
  }

  .updates-container {
    font-family: var(--code-font);
    font-size: 0.85rem;
    line-height: 1.6;
    max-height: 180px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .updates-container::-webkit-scrollbar {
    width: 4px;
  }

  .updates-container::-webkit-scrollbar-track {
    background: transparent;
  }

  .updates-container::-webkit-scrollbar-thumb {
    background: var(--text-decoration-color);
    border-radius: 2px;
  }

  .update-item {
    display: flex;
    gap: 1.25em;
    padding: 0.32em 0;
    align-items: baseline;
  }

  .update-date {
    color: var(--primary-color);
    min-width: 4.5em;
    white-space: nowrap;
    opacity: 0.9;
  }

  .update-text {
    color: var(--text-color);
  }

  .update-text a {
    color: var(--primary-color);
    text-decoration: none;
    border-bottom: 1px solid var(--primary-pale-color);
  }

  .update-text a:hover {
    border-bottom-color: var(--primary-color);
  }

  /* CV / Résumé as a mono line tied to the changelog */
  #log-docs {
    font-family: var(--code-font);
    font-size: 0.82rem;
    color: var(--text-pale-color);
    margin-top: 1.3em;
    padding-top: 1em;
    border-top: 1px solid var(--text-decoration-color);
  }

  #log-docs a {
    color: var(--primary-color);
    text-decoration: none;
    border-bottom: 1px solid var(--primary-pale-color);
  }

  #log-docs a:hover {
    border-bottom-color: var(--primary-color);
  }

  #log-docs .sep {
    color: var(--text-pale-color);
  }

  #log-docs .dl {
    color: var(--primary-color);
    font-weight: 600;
  }

  /* Projects section - stacked layout (image above text) */
  .collection.art {
    flex-direction: column !important;
    align-items: flex-start !important;
  }

  .collection.art .img-wrapper {
    width: 100% !important;
    height: auto !important;
    max-width: 100%;
    display: flex;
    justify-content: center;
  }

  .collection.art .img-wrapper img {
    width: auto !important;
    height: auto !important;
    max-height: 280px;
    object-fit: contain;
  }

  .collection.art .text {
    width: 100%;
    height: auto !important;
  }

  .collection.art .content {
    -webkit-line-clamp: unset !important;
    display: block !important;
    overflow: visible !important;
  }

  /* Separator lines between project cards */
  .collection.art,
  .collection.card {
    border-bottom: 1px solid var(--text-decoration-color) !important;
    padding-bottom: 3em !important;
    margin-bottom: 2em;
  }

  /* Remove separator from last card */
  section.collection-wrapper > .collection:last-child {
    border-bottom: none !important;
    margin-bottom: 0;
  }

  /* Experience section - larger icons with stacked title/date */
  .collection.card .meta {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    gap: 0;
    align-items: start;
  }

  /* When icon is present, use two-column layout */
  .collection.card .meta:has(.icon-wrapper) {
    grid-template-columns: 48px 1fr;
    gap: 0 0.75em;
  }

  .collection.card .meta .icon-wrapper {
    grid-row: span 2;
    height: auto;
    align-self: center;
  }

  .collection.card .meta .icon {
    width: 48px !important;
    height: 48px !important;
    object-fit: contain;
  }

  .collection.card .meta:has(.icon-wrapper) .title {
    grid-column: 2;
    grid-row: 1;
  }

  .collection.card .meta:has(.icon-wrapper) .date {
    grid-column: 2;
    grid-row: 2;
    margin-left: 0;
  }

  /* Without icon, keep simple stacked layout */
  .collection.card .meta:not(:has(.icon-wrapper)) .date {
    margin-left: 0;
  }

  /* Tagline */
  #bio {
    white-space: pre-line;
  }

  body.homepage #info #bio {
    color: var(--text-pale-color);
    font-size: 0.95rem;
  }

  /* Landing page name */
  body.homepage #name {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* Social row in the header */
  body.homepage #info #social {
    display: flex;
    align-items: center;
    gap: 0.7em;
    margin-top: 0.35em;
  }

  body.homepage #info #social a,
  body.homepage #info #social button {
    color: var(--text-color);
    line-height: 0;
    padding: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  body.homepage #info #social a:hover,
  body.homepage #info #social button:hover {
    color: var(--primary-color);
  }

  body.homepage #info #social svg {
    width: 20px;
    height: 20px;
  }

  /* Contents index with dotted leaders */
  body.homepage #index {
    display: flex;
    flex-direction: column;
    margin: 2.2em 0 2.5em;
    padding: 0 15px;
  }

  body.homepage #index a.ix-row {
    display: flex;
    align-items: baseline;
    gap: 0.75em;
    padding: 0.72em 0;
    color: var(--text-color);
    text-decoration: none;
    border-top: 1px solid var(--text-decoration-color);
  }

  body.homepage #index a.ix-row:first-child {
    border-top: none;
  }

  body.homepage #index a.ix-row:hover .ix-label {
    color: var(--primary-color);
  }

  body.homepage #index .ix-label {
    font-size: 1.05rem;
    font-weight: 500;
    white-space: nowrap;
  }

  body.homepage #index .ix-leader {
    flex: 1 1 1.5em;
    min-width: 1.5em;
    border-bottom: 1px dotted var(--text-decoration-color);
    transform: translateY(-0.25em);
  }

  body.homepage #index .ix-desc {
    color: var(--text-pale-color);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  @media (max-width: 480px) {
    /* Stack the description under the label and drop the dotted leader,
       so the elaborations stay visible on narrow screens. */
    body.homepage #index a.ix-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.15em;
    }
    body.homepage #index .ix-leader {
      display: none;
    }
    body.homepage #index .ix-desc {
      white-space: normal;
    }
  }

  /* Hide dates from blog posts */
  .post-list .date,
  #post-info #date {
    display: none;
  }

  /* ===== Accordion Blog List Styles ===== */

  /* Accordion container */
  .post-list.accordion-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Each accordion item */
  .post-accordion {
    border-bottom: 1px solid var(--text-decoration-color);
    padding: 1.25em 0;
  }

  .post-accordion:last-child {
    border-bottom: none;
  }

  /* Remove default marker */
  .post-accordion summary {
    list-style: none;
    cursor: pointer;
  }

  .post-accordion summary::-webkit-details-marker {
    display: none;
  }

  /* Header (collapsed state) */
  .post-header {
    display: flex;
    flex-direction: column;
    gap: 0.4em;
  }

  .post-header:hover .post-title {
    color: var(--primary-color);
  }

  /* Title */
  .post-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text-color);
    transition: color 0.2s ease;
  }

  /* Description */
  .post-description {
    font-size: 0.95rem;
    color: var(--text-pale-color);
    line-height: 1.5;
  }

  /* Tags */
  .post-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5em;
    margin-top: 0.25em;
  }

  .post-tags .tag {
    font-size: 0.85rem;
    color: var(--primary-color);
  }

  /* Expanded content */
  .post-accordion .post-content {
    margin-top: 1.5em;
    padding-left: 1em;
    border-left: 2px solid var(--primary-pale-color);
  }

  /* Read more link */
  .read-more {
    margin-top: 1.5em;
  }

  .read-more a {
    color: var(--primary-color);
    font-weight: 500;
    text-decoration: none;
  }

  .read-more a:hover {
    text-decoration: underline;
  }

  .external-icon {
    font-size: 0.9em;
    margin-left: 0.25em;
  }

  /* Open state indicator */
  .post-accordion[open] .post-title {
    color: var(--primary-color);
  }

  /* Direct-link posts (no external_url): whole entry links to its page */
  a.post-link {
    display: block;
    text-decoration: none;
    color: inherit;
  }

  /* Pinned theme toggle: fixed top-right, visible while scrolling anywhere.
     The button is relocated here from the footer/links by _head_extend.html. */
  #pinned-theme-toggle {
    position: fixed;
    top: 0.6rem;
    right: 0.75rem;
    z-index: 100;
  }

  #pinned-theme-toggle #theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px;
    border: none;
    border-radius: 999px;
    background-color: var(--bg-color);
    color: var(--text-pale-color);
    cursor: pointer;
    line-height: 0;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    transition: color 0.2s ease;
  }

  #pinned-theme-toggle #theme-toggle:hover {
    color: var(--primary-color);
  }

  #pinned-theme-toggle svg {
    width: 20px;
    height: 20px;
  }

  /* Scrollspy: highlight the TOC entry for the section currently in view */
  body.post aside nav a.active {
    color: var(--primary-color);
    font-weight: 600;
  }

  /* Featured post styling */
  .post-accordion.featured .post-title::before {
    content: "* ";
    color: var(--primary-color);
  }

  /* Post figures: render light matplotlib plots on a white card and skip the
     dark-mode brightness dimming, so pale/low-contrast plots stay legible. */
  .prose figure img {
    background: #fff;
  }

  body.dark .prose figure img {
    filter: none;
  }

  /* Let post figures use the full content width (the global 500px cap is for
     the About section). Plots are high-res, so they stay sharp when enlarged. */
  body.post .prose figure {
    max-width: 100%;
  }

</style>
